<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>음성 인식 테스트 — 단어 말하기</title>
<style>
*{box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  max-width:620px;margin:0 auto;padding:16px;background:#f5f6f8;color:#222;}
h1{font-size:20px;margin:8px 0;}
.muted{color:#888;font-size:12px;word-break:break-all;}
.card{background:#fff;border-radius:12px;padding:14px;margin:12px 0;
  box-shadow:0 1px 4px rgba(0,0,0,.08);}
label{display:block;font-size:13px;font-weight:700;margin:10px 0 4px;}
input[type=text]{width:100%;padding:10px;font-size:16px;border:1px solid #ccc;
  border-radius:8px;}
select{width:100%;padding:10px;font-size:16px;border:1px solid #ccc;
  border-radius:8px;background:#fff;}
.wordrow{display:flex;gap:8px;}
.wordrow input{flex:1;}
.bplay{flex:0 0 auto;background:#0891b2;padding:10px 14px;font-size:13px;
  min-width:0;white-space:nowrap;}
.btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
button{flex:1;min-width:110px;padding:14px 8px;font-size:14px;font-weight:700;
  border:none;border-radius:10px;color:#fff;cursor:pointer;line-height:1.3;}
button:disabled{opacity:.4;}
.b1{background:#2563eb;}
.b2{background:#16a34a;}
.b3{background:#7c3aed;}
.bstop{background:#dc2626;}
#mode{font-weight:700;font-size:14px;margin-top:8px;}
#prompt{margin-top:4px;}
.live{min-height:52px;border:2px dashed #cbd5e1;border-radius:8px;padding:10px;
  margin-top:8px;font-size:20px;line-height:1.4;}
.interim{color:#94a3b8;}
.final{color:#111;font-weight:700;}
.sub{font-size:12px;font-weight:700;color:#475569;margin:12px 0 4px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th,td{border:1px solid #e2e8f0;padding:5px 6px;text-align:left;word-break:break-all;}
th{background:#f1f5f9;}
.verdict{margin-top:10px;padding:12px;border-radius:8px;font-weight:700;
  font-size:15px;text-align:center;line-height:1.5;}
.v-ok{background:#dcfce7;color:#15803d;}
.v-near{background:#fef3c7;color:#b45309;}
.v-no{background:#fee2e2;color:#b91c1c;}
.log{font-family:ui-monospace,Menlo,monospace;font-size:12px;background:#1e293b;
  color:#cbd5e1;border-radius:8px;padding:10px;white-space:pre-wrap;
  max-height:240px;overflow:auto;margin-top:8px;}
.metric{font-size:13px;margin:4px 0;}
</style>
</head>
<body>
<h1>음성 인식 테스트</h1>
<div class="muted">단어 말하기 평가 방식 검증용 · 학생 앱과 분리된 독립 페이지</div>
<div class="muted" id="ua"></div>

<div class="card">
  <label>테스트 단어 선택 <span class="muted">(최근 7일 AI로 넘어간 단어 · 빈도순)</span></label>
  <select id="wordPick" onchange="pickWord()"></select>
  <label>목표 단어</label>
  <div class="wordrow">
    <input type="text" id="targetWord" value="right">
    <button type="button" class="bplay" onclick="playWord()">정답 발음 듣기</button>
  </div>
  <label>한글 발음표기 <span class="muted">(2차 한국어 STT 비교용 · 선택)</span></label>
  <input type="text" id="targetKo" value="라이트">
  <label>3차 문장 <span class="muted">(목표 단어가 포함된 문장)</span></label>
  <input type="text" id="targetSent" value="Turn right at the next corner">

  <div class="btns">
    <button class="b1" id="btn1" onclick="start('en')">1차<br>영어 STT</button>
    <button class="b2" id="btn2" onclick="start('ko')">2차<br>한국어 STT</button>
    <button class="b3" id="btn3" onclick="start('sentence')">3차<br>문장 말하기</button>
  </div>
  <div class="btns">
    <button class="bstop" id="btnStop" onclick="stopRec()" disabled>중지</button>
  </div>
  <div id="mode"></div>
  <div id="prompt" class="muted"></div>
</div>

<div class="card">
  <div class="sub">실시간 인식 (말하는 즉시 문자화)</div>
  <div class="live"><span class="final" id="final"></span> <span class="interim" id="interim"></span></div>
  <div id="result"></div>
</div>

<div class="card">
  <div class="sub">이벤트 로그</div>
  <div class="log" id="log"></div>
</div>

<script>
var $=function(id){return document.getElementById(id);};
$('ua').textContent=navigator.userAgent;
var rec=null,t0=0,firstT=0;

function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){
  return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}

function lev(a,b){
  a=a||'';b=b||'';
  var m=a.length,n=b.length;
  if(!m)return n;if(!n)return m;
  var d=[],i,j;
  for(i=0;i<=m;i++)d[i]=[i];
  for(j=0;j<=n;j++)d[0][j]=j;
  for(i=1;i<=m;i++)for(j=1;j<=n;j++){
    var c=a[i-1]===b[j-1]?0:1;
    d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+c);
  }
  return d[m][n];
}
function sim(a,b){
  a=(a||'').toLowerCase().trim();b=(b||'').toLowerCase().trim();
  if(!a&&!b)return 1;
  var L=Math.max(a.length,b.length);
  if(!L)return 0;
  return 1-lev(a,b)/L;
}
function bestWordSim(sentence,target){
  var words=(sentence||'').toLowerCase().replace(/[^a-z'\s가-힣]/g,' ').split(/\s+/).filter(Boolean);
  var best=0,bestW='';
  for(var i=0;i<words.length;i++){
    var s=sim(words[i],target);
    if(s>best){best=s;bestW=words[i];}
  }
  return {sim:best,word:bestW};
}
function log(msg){
  var t=t0?((performance.now()-t0)/1000).toFixed(2):'-';
  $('log').textContent+='['+t+'s] '+msg+'\n';
  $('log').scrollTop=$('log').scrollHeight;
}
function stopRec(){if(rec){try{rec.stop();}catch(e){}}}
function setBusy(b){
  $('btn1').disabled=b;$('btn2').disabled=b;$('btn3').disabled=b;
  $('btnStop').disabled=!b;
}

function start(mode){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('이 브라우저는 음성 인식(Web Speech API)을 지원하지 않습니다.');return;}
  if(rec){try{rec.abort();}catch(e){}}
  $('interim').textContent='';
  $('final').textContent='';
  $('result').innerHTML='';
  $('log').textContent='';
  firstT=0;

  var target=$('targetWord').value.trim();
  var lang=mode==='ko'?'ko-KR':'en-US';
  var modeLabel=mode==='en'?'1차 · 영어 STT (en-US)':
    mode==='ko'?'2차 · 한국어 STT (ko-KR)':'3차 · 문장 말하기 (en-US)';
  $('mode').textContent=modeLabel;

  if(mode==='sentence'){
    var sent=$('targetSent').value.trim();
    var re=new RegExp('\\b'+target.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b','i');
    $('prompt').textContent='읽을 문장: '+sent.replace(re,'_____')+'   (빈칸 = '+target+')';
  }else if(mode==='ko'){
    $('prompt').textContent='"'+target+'" 를 영어로 발음하세요 (한국어 모드로 인식)';
  }else{
    $('prompt').textContent='"'+target+'" 를 영어로 발음하세요';
  }

  rec=new SR();
  rec.lang=lang;
  rec.continuous=false;
  rec.interimResults=true;
  rec.maxAlternatives=5;

  ['audiostart','soundstart','speechstart','speechend','soundend','audioend']
    .forEach(function(ev){rec['on'+ev]=function(){log('on'+ev);};});
  rec.onstart=function(){log('onstart');};
  rec.onnomatch=function(){log('onnomatch (일치 결과 없음)');};
  rec.onerror=function(e){log('onerror: '+e.error);};
  rec.onend=function(){
    log('onend');
    setBusy(false);
    if(!firstT){
      $('result').innerHTML='<div class="verdict v-no">인식 결과 없음 (onresult 미발생)<br>'+
        '<span style="font-size:12px;font-weight:400;">발음이 인식 임계값에 못 미쳤거나 무음 — 안드로이드 Chrome의 전형적 한계 케이스</span></div>';
    }
  };
  rec.onresult=function(e){
    if(!firstT){firstT=performance.now();log('onresult (첫 결과 수신)');}
    var interim='',finalRes=null;
    for(var i=0;i<e.results.length;i++){
      var r=e.results[i];
      if(r.isFinal)finalRes=r;
      else interim+=r[0].transcript;
    }
    $('interim').textContent=interim;
    if(finalRes){
      $('final').textContent=finalRes[0].transcript;
      log('최종 결과: "'+finalRes[0].transcript+'"');
      showResult(mode,target,finalRes);
    }
  };

  t0=performance.now();
  log('시작 — '+modeLabel);
  setBusy(true);
  try{rec.start();}catch(e){log('start 실패: '+e.message);setBusy(false);}
}

function showResult(mode,target,result){
  var alts=[],i;
  for(i=0;i<result.length;i++){
    alts.push({t:result[i].transcript||'',c:result[i].confidence});
  }
  var elapsed=firstT?((firstT-t0)/1000).toFixed(2):'-';
  var html='<div class="metric">첫 인식까지: <b>'+elapsed+'s</b> · 후보 수: <b>'+alts.length+'</b></div>';
  html+='<div class="sub">인식 후보 (alternatives · 최대 5)</div>';
  html+='<table><tr><th>#</th><th>인식 텍스트</th><th>신뢰도</th>';
  if(mode!=='ko')html+='<th>목표 유사도</th>';
  html+='</tr>';
  var bestSim=0;
  for(i=0;i<alts.length;i++){
    var a=alts[i];
    html+='<tr><td>'+(i+1)+'</td><td>'+esc(a.t)+'</td><td>'+
      (a.c!=null&&a.c>0?(a.c*100).toFixed(0)+'%':'미제공')+'</td>';
    if(mode!=='ko'){
      var s;
      if(mode==='sentence'){s=bestWordSim(a.t,target).sim;}
      else s=sim(a.t,target);
      if(s>bestSim)bestSim=s;
      html+='<td>'+(s*100).toFixed(0)+'%</td>';
    }
    html+='</tr>';
  }
  html+='</table>';

  if(mode==='ko'){
    var ko=$('targetKo').value.trim();
    var heard=alts[0]?alts[0].t:'';
    if(ko){
      var ks=sim(heard,ko);
      var cls=ks>=0.7?'v-ok':ks>=0.4?'v-near':'v-no';
      html+='<div class="verdict '+cls+'">한글 인식: "'+esc(heard)+'"<br>'+
        '발음표기 "'+esc(ko)+'" 와 유사도 '+(ks*100).toFixed(0)+'%</div>';
    }else{
      html+='<div class="verdict v-near">한글 인식 결과: "'+esc(heard)+'"<br>'+
        '<span style="font-size:12px;font-weight:400;">한글 발음표기를 입력하면 유사도도 표시됩니다</span></div>';
    }
  }else if(mode==='sentence'){
    var fin=alts[0]?alts[0].t:'';
    var bw=bestWordSim(fin,target);
    var found=bw.sim>=0.85;
    var cls2=found?'v-ok':bw.sim>=0.6?'v-near':'v-no';
    html+='<div class="verdict '+cls2+'">'+
      (found?'문장 속에서 목표 단어 발견':'목표 단어 미발견')+'<br>'+
      '가장 가까운 단어: "'+esc(bw.word)+'" ('+(bw.sim*100).toFixed(0)+'%)</div>';
  }else{
    var cls3=bestSim>=0.99?'v-ok':bestSim>=0.7?'v-near':'v-no';
    var label=bestSim>=0.99?'정확 일치':bestSim>=0.7?'유사 (발음 차이 가능)':'불일치';
    html+='<div class="verdict '+cls3+'">'+label+' · 최고 유사도 '+(bestSim*100).toFixed(0)+'%</div>';
  }
  $('result').innerHTML=html;
}

// 최근 7일(5/16~5/22) 단어 말하기에서 3차 AI 로 넘어간 단어 — 빈도순
// (한글 섞인 패턴·변화형 표기 제외, 빈도 2회 이상)
// [단어, 빈도, 한글발음표기(기본값), 3차 문장] — 한글표기·문장은 기본값, 직접 수정 가능
var AI_WORDS=[
  ['whip',15,'윕','He will whip the cream'],
  ['stuff',14,'스터프','Put your stuff in the bag'],
  ['trick',11,'트릭','The magician did a trick'],
  ['feel',11,'필','I feel better than yesterday'],
  ['blob',10,'블롭','A blob of paint fell down'],
  ['roll up',9,'롤 업','Roll up the carpet'],
  ['wild',8,'와일드','The wild animal ran away'],
  ['destroy',8,'디스트로이','The storm will destroy the house'],
  ['be destroyed',8,'비 디스트로이드','The old house will be destroyed'],
  ['astound',7,'어스타운드','The news will astound you'],
  ['amaze',7,'어메이즈','Magic tricks amaze me'],
  ['ought to',7,'오트 투','You ought to rest early'],
  ['very',7,'베리','This soup is very hot'],
  ['pass',7,'패스','Please pass me the salt'],
  ['smell',7,'스멜','I smell fresh bread'],
  ['cans of squirt cheese',6,'캔즈 오브 스쿼트 치즈','She bought cans of squirt cheese'],
  ['tease',6,'티즈','Do not tease your sister'],
  ['dibble dibble',6,'디블 디블','I heard a dibble dibble sound'],
  ['fuel',5,'퓨얼','The car needs more fuel'],
  ['squirt',5,'스쿼트','Squirt some water on the plant'],
  ['horn',5,'혼','The car horn is very loud'],
  ['pirate treasure',4,'파이럿 트레저','We found pirate treasure'],
  ['go wild',4,'고 와일드','The fans go wild'],
  ['door',4,'도어','Please close the door'],
  ['as though',4,'애즈 도우','He runs as though he is late'],
  ['claim',4,'클레임','She will claim the prize'],
  ['be replaced',3,'비 리플레이스드','The light will be replaced'],
  ['gooey',3,'구이','The candy is soft and gooey'],
  ['respond',3,'리스폰드','Please respond to my message'],
  ['training lesson',3,'트레이닝 레슨','I have a training lesson today'],
  ['earn',3,'언','I earn money by working'],

  ['dig for',3,'딕 포','Dogs dig for bones'],

  ['after school',2,'애프터 스쿨','We meet after school'],
  ['beast',2,'비스트','The beast lived in the forest'],

  ['set up',2,'셋 업','We set up the tent'],
  ['extra',2,'엑스트라','I have an extra pencil'],
  ['product',2,'프로덕트','This product is brand new'],
  ['any person',2,'애니 퍼슨','Any person can join us'],
  ['profit',2,'프로핏','The shop made a profit'],
  ['service',2,'서비스','The hotel service is good'],
  ['butterfly',2,'버터플라이','A butterfly has pretty wings'],
  ['cat',2,'캣','The cat is sleeping now'],
  ['think',2,'씽크','I think you are right'],
  ['roll',2,'롤','The ball will roll down'],
  ['futuristic',2,'퓨처리스틱','The car looks futuristic'],
  ['dowel',2,'다월','He used a wooden dowel'],
  ['assign',2,'어사인','The teacher will assign homework'],
  ['killed',2,'킬드','The frost killed the plant'],
  ['pack up',2,'팩 업','Please pack up your things'],
  ['trouble',2,'트러블','He is in big trouble'],
  ['strange',2,'스트레인지','I heard a strange sound'],
  ['sholy',2,'숄리','sholy'],
  ['meat-thing',2,'미트 씽','He made a meat-thing'],
  ['gag',2,'개그','The clown told a funny gag'],
  ['material',2,'머티리얼','This material is very soft'],
  ['pursuit',2,'퍼슈트','He is in pursuit of a dream'],
  ['in terms of',2,'인 텀즈 오브','It is cheap in terms of price'],
  ['whisper',2,'위스퍼','Please whisper in the library'],
  ['choo choo',2,'추 추','The train goes choo choo'],
  ['rooster',2,'루스터','The rooster crows in the morning'],
  ['volleyball',2,'발리볼','We play volleyball at school'],
  ['rental shop',2,'렌탈 샵','The rental shop is closed today']
];
(function(){
  var sel=$('wordPick');
  var o0=document.createElement('option');
  o0.value='';o0.textContent='— 목록에서 선택 (직접 입력도 가능) —';
  sel.appendChild(o0);
  AI_WORDS.forEach(function(p){
    var o=document.createElement('option');
    o.value=p[0];o.textContent=p[0]+'  ('+p[1]+'회)';
    sel.appendChild(o);
  });
})();
function pickWord(){
  var v=$('wordPick').value;
  if(!v)return;
  var found=null;
  for(var i=0;i<AI_WORDS.length;i++){if(AI_WORDS[i][0]===v){found=AI_WORDS[i];break;}}
  $('targetWord').value=v;
  $('targetKo').value=found&&found[2]?found[2]:'';
  $('targetSent').value=found&&found[3]?found[3]:'';
}
function playWord(){
  var w=$('targetWord').value.trim();
  if(!w)return;
  if(!window.speechSynthesis){alert('이 브라우저는 음성 합성(TTS)을 지원하지 않습니다.');return;}
  try{
    speechSynthesis.cancel();
    var u=new SpeechSynthesisUtterance(w);
    u.lang='en-US';u.rate=0.9;
    speechSynthesis.speak(u);
  }catch(e){}
}
</script>
</body>
</html>
