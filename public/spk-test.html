<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>음성 인식 테스트 — 단어 말하기</title>
<style>
*{box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  max-width:620px;margin:0 auto;padding:16px;background:#f5f6f8;color:#222;}
h1{font-size:20px;margin:8px 0;}
.muted{color:#888;font-size:12px;word-break:break-all;}
.card{background:#fff;border-radius:12px;padding:14px;margin:12px 0;
  box-shadow:0 1px 4px rgba(0,0,0,.08);}
label{display:block;font-size:13px;font-weight:700;margin:10px 0 4px;}
input[type=text]{width:100%;padding:10px;font-size:16px;border:1px solid #ccc;
  border-radius:8px;}
select{width:100%;padding:10px;font-size:16px;border:1px solid #ccc;
  border-radius:8px;background:#fff;}
.wordrow{display:flex;gap:8px;}
.wordrow input{flex:1;}
.bplay{flex:0 0 auto;background:#0891b2;padding:10px 14px;font-size:13px;
  min-width:0;white-space:nowrap;}
.btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
button{flex:1;min-width:110px;padding:14px 8px;font-size:14px;font-weight:700;
  border:none;border-radius:10px;color:#fff;cursor:pointer;line-height:1.3;}
button:disabled{opacity:.4;}
.b1{background:#2563eb;}
.b2{background:#16a34a;}
.b3{background:#7c3aed;}
.bstop{background:#dc2626;}
#mode{font-weight:700;font-size:14px;margin-top:8px;}
#prompt{margin-top:6px;font-size:15px;color:#222;line-height:1.6;}
.hl{background:#fde68a;padding:0 4px;border-radius:3px;font-weight:700;}
.unfit{margin-top:8px;padding:8px 10px;background:#fef3c7;color:#92400e;
  border-radius:6px;font-size:13px;font-weight:700;}
.live{min-height:52px;border:2px dashed #cbd5e1;border-radius:8px;padding:10px;
  margin-top:8px;font-size:20px;line-height:1.4;}
.interim{color:#94a3b8;}
.final{color:#111;font-weight:700;}
.sub{font-size:12px;font-weight:700;color:#475569;margin:12px 0 4px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th,td{border:1px solid #e2e8f0;padding:5px 6px;text-align:left;word-break:break-all;}
th{background:#f1f5f9;}
.verdict{margin-top:10px;padding:12px;border-radius:8px;font-weight:700;
  font-size:16px;text-align:center;line-height:1.5;}
.v-ok{background:#dcfce7;color:#15803d;}
.v-near{background:#fef3c7;color:#b45309;}
.v-no{background:#fee2e2;color:#b91c1c;}
.log{font-family:ui-monospace,Menlo,monospace;font-size:12px;background:#1e293b;
  color:#cbd5e1;border-radius:8px;padding:10px;white-space:pre-wrap;
  max-height:240px;overflow:auto;margin-top:8px;}
.metric{font-size:13px;margin:4px 0;}
</style>
</head>
<body>
<h1>음성 인식 테스트</h1>
<div class="muted">단어 말하기 평가 방식 검증용 · 학생 앱과 분리된 독립 페이지</div>
<div class="muted" id="ua"></div>

<div class="card">
  <label>테스트 단어 선택 <span class="muted">(최근 7일 AI로 넘어간 단어 · 빈도순)</span></label>
  <select id="wordPick" onchange="pickWord()"></select>
  <label>목표 단어</label>
  <div class="wordrow">
    <input type="text" id="targetWord" value="right" oninput="showUnfit('')">
    <button type="button" class="bplay" onclick="playWord()">정답 발음 듣기</button>
  </div>
  <label>한글 발음표기 <span class="muted">(2차 한국어 STT 비교용 · 공백 무시하고 비교)</span></label>
  <input type="text" id="targetKo" value="라이트">
  <label>3차 문장 <span class="muted">(목표 단어를 문장 가운데 배치)</span></label>
  <input type="text" id="targetSent" value="Please turn right at the next corner">
  <label>3차 문장 해석</label>
  <input type="text" id="targetSentKo" value="다음 모퉁이에서 오른쪽으로 도세요">

  <div class="btns">
    <button class="b1" id="btn1" onclick="start('en')">1차<br>영어 STT</button>
    <button class="b2" id="btn2" onclick="start('ko')">2차<br>한국어 STT</button>
    <button class="b3" id="btn3" onclick="start('sentence')">3차<br>문장 말하기</button>
  </div>
  <div class="btns">
    <button class="bstop" id="btnStop" onclick="stopRec()" disabled>중지</button>
  </div>
  <div id="mode"></div>
  <div id="prompt"></div>
  <div id="unfit"></div>
</div>

<div class="card">
  <div class="sub">실시간 인식 (말하는 즉시 문자화)</div>
  <div class="live"><span class="final" id="final"></span> <span class="interim" id="interim"></span></div>
  <div id="result"></div>
</div>

<div class="card">
  <div class="sub">이벤트 로그</div>
  <div class="log" id="log"></div>
</div>

<script>
var $=function(id){return document.getElementById(id);};
$('ua').textContent=navigator.userAgent;
var rec=null,t0=0,firstT=0;

function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){
  return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function reEsc(s){return String(s||'').replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}

function lev(a,b){
  a=a||'';b=b||'';
  var m=a.length,n=b.length;
  if(!m)return n;if(!n)return m;
  var d=[],i,j;
  for(i=0;i<=m;i++)d[i]=[i];
  for(j=0;j<=n;j++)d[0][j]=j;
  for(i=1;i<=m;i++)for(j=1;j<=n;j++){
    var c=a[i-1]===b[j-1]?0:1;
    d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+c);
  }
  return d[m][n];
}
function sim(a,b){
  a=(a||'').toLowerCase().trim();b=(b||'').toLowerCase().trim();
  if(!a&&!b)return 1;
  var L=Math.max(a.length,b.length);
  if(!L)return 0;
  return 1-lev(a,b)/L;
}
// 공백 무시 비교 — STT 가 두 단어를 붙여 인식하는 케이스 대응 (피드백 1)
function simNoSpace(a,b){
  return sim((a||'').replace(/\s/g,''),(b||'').replace(/\s/g,''));
}
// 문장 안에서 목표(한 단어 또는 여러 단어 구)만 찾는 유사도 — 다른 단어는 비교 X (피드백 2)
function bestPhraseSim(sentence,target){
  var sw=(sentence||'').toLowerCase().replace(/[^a-z'\s가-힣]/g,' ').split(/\s+/).filter(Boolean);
  var tw=(target||'').toLowerCase().split(/\s+/).filter(Boolean);
  var n=tw.length;
  if(!n||!sw.length)return {sim:0,word:''};
  var tgtJoin=tw.join('');
  var best=0,bestW='';
  for(var i=0;i+n<=sw.length;i++){
    var win=sw.slice(i,i+n);
    var s=Math.max(sim(win.join(' '),tw.join(' ')),sim(win.join(''),tgtJoin));
    if(s>best){best=s;bestW=win.join(' ');}
  }
  if(n>1){  // 구를 STT 가 한 단어로 붙여 인식한 경우
    for(var j=0;j<sw.length;j++){
      var s2=sim(sw[j],tgtJoin);
      if(s2>best){best=s2;bestW=sw[j];}
    }
  }
  return {sim:best,word:bestW};
}
function log(msg){
  var t=t0?((performance.now()-t0)/1000).toFixed(2):'-';
  $('log').textContent+='['+t+'s] '+msg+'\n';
  $('log').scrollTop=$('log').scrollHeight;
}
function stopRec(){if(rec){try{rec.stop();}catch(e){}}}
function setBusy(b){
  $('btn1').disabled=b;$('btn2').disabled=b;$('btn3').disabled=b;
  $('btnStop').disabled=!b;
}

function start(mode){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('이 브라우저는 음성 인식(Web Speech API)을 지원하지 않습니다.');return;}
  if(rec){try{rec.abort();}catch(e){}}
  $('interim').textContent='';
  $('final').textContent='';
  $('result').innerHTML='';
  $('log').textContent='';
  firstT=0;

  var target=$('targetWord').value.trim();
  var lang=mode==='ko'?'ko-KR':'en-US';
  var modeLabel=mode==='en'?'1차 · 영어 STT (en-US)':
    mode==='ko'?'2차 · 한국어 STT (ko-KR)':'3차 · 문장 말하기 (en-US)';
  $('mode').textContent=modeLabel;

  if(mode==='sentence'){
    var sent=$('targetSent').value.trim();
    var ko=$('targetSentKo').value.trim();
    // 목표 단어를 배경색으로 강조 (공란 X — 무슨 단어를 평가하는지 보이게, 피드백 1)
    var re=new RegExp('\\b'+reEsc(target)+'\\b','i');
    var hlSent=esc(sent).replace(re,function(m){return '<span class="hl">'+m+'</span>';});
    $('prompt').innerHTML='읽을 문장: '+hlSent+
      (ko?'<br>해석: '+esc(ko):'')+
      '<br><span class="muted">노란색 강조 = 평가 대상 단어. 문장째 읽어도, 그 단어만 말해도 됩니다.</span>';
  }else if(mode==='ko'){
    $('prompt').innerHTML='<b>'+esc(target)+'</b> 를 영어로 발음하세요 (한국어 모드로 인식)';
  }else{
    $('prompt').innerHTML='<b>'+esc(target)+'</b> 를 영어로 발음하세요';
  }

  rec=new SR();
  rec.lang=lang;
  rec.continuous=false;
  rec.interimResults=true;
  rec.maxAlternatives=5;

  ['audiostart','soundstart','speechstart','speechend','soundend','audioend']
    .forEach(function(ev){rec['on'+ev]=function(){log('on'+ev);};});
  rec.onstart=function(){log('onstart');};
  rec.onnomatch=function(){log('onnomatch (일치 결과 없음)');};
  rec.onerror=function(e){log('onerror: '+e.error);};
  rec.onend=function(){
    log('onend');
    setBusy(false);
    if(!firstT){
      $('result').innerHTML='<div class="verdict v-no">오답<br>'+
        '<span style="font-size:12px;font-weight:400;">인식 결과 없음 (onresult 미발생) — 발음이 인식 임계값에 못 미쳤거나 무음. 안드로이드 Chrome 의 전형적 한계 케이스.</span></div>';
    }
  };
  rec.onresult=function(e){
    if(!firstT){firstT=performance.now();log('onresult (첫 결과 수신)');}
    var interim='',finalRes=null;
    for(var i=0;i<e.results.length;i++){
      var r=e.results[i];
      if(r.isFinal)finalRes=r;
      else interim+=r[0].transcript;
    }
    $('interim').textContent=interim;
    if(finalRes){
      $('final').textContent=finalRes[0].transcript;
      log('최종 결과: "'+finalRes[0].transcript+'"');
      showResult(mode,target,finalRes);
    }
  };

  t0=performance.now();
  log('시작 — '+modeLabel);
  setBusy(true);
  try{rec.start();}catch(e){log('start 실패: '+e.message);setBusy(false);}
}

function showResult(mode,target,result){
  var alts=[],i;
  for(i=0;i<result.length;i++){
    alts.push({t:result[i].transcript||'',c:result[i].confidence});
  }
  var elapsed=firstT?((firstT-t0)/1000).toFixed(2):'-';
  var html='<div class="metric">첫 인식까지: <b>'+elapsed+'s</b> · 후보 수: <b>'+alts.length+'</b></div>';
  html+='<div class="sub">인식 후보 (alternatives · 최대 5)</div>';
  html+='<table><tr><th>#</th><th>인식 텍스트</th><th>신뢰도</th>';
  if(mode!=='ko')html+='<th>'+(mode==='sentence'?'문제 단어 매칭':'목표 유사도')+'</th>';
  html+='</tr>';
  var bestSim=0,bestWord='';
  for(i=0;i<alts.length;i++){
    var a=alts[i];
    html+='<tr><td>'+(i+1)+'</td><td>'+esc(a.t||'(빈 결과)')+'</td><td>'+
      (a.c!=null&&a.c>0?(a.c*100).toFixed(0)+'%':'미제공')+'</td>';
    if(mode!=='ko'){
      var s;
      if(mode==='sentence'){var bp=bestPhraseSim(a.t,target);s=bp.sim;if(s>bestSim){bestWord=bp.word;}}
      else {s=sim(a.t,target);if(s>bestSim){bestWord=a.t;}}
      if(s>bestSim)bestSim=s;
      html+='<td>'+(s*100).toFixed(0)+'%</td>';
    }
    html+='</tr>';
  }
  html+='</table>';

  var v;
  if(mode==='ko'){
    var ko=$('targetKo').value.trim();
    var heard=alts[0]?alts[0].t:'';
    if(!ko){
      v={cls:'v-near',title:'판정 보류',sub:'한글 인식 "'+esc(heard)+'" — 발음표기를 입력하면 정답/오답이 표시됩니다'};
    }else{
      var ks=simNoSpace(heard,ko);
      if(ks>=0.7) v={cls:'v-ok',title:'정답',sub:'한글 인식 "'+esc(heard)+'" ≈ 발음표기 "'+esc(ko)+'" (공백 무시 유사도 '+(ks*100).toFixed(0)+'%)'};
      else v={cls:'v-no',title:'오답',sub:'사유: 한글 인식 "'+esc(heard)+'" 가 발음표기 "'+esc(ko)+'" 와 다름 (공백 무시 유사도 '+(ks*100).toFixed(0)+'%)'};
    }
  }else if(mode==='sentence'){
    // 문제 단어만으로 평가 — 다른 단어 비교 X (피드백 2)
    if(bestSim>=0.85){
      v={cls:'v-ok',title:'정답',sub:'문제 단어 "'+esc(target)+'" — 문장에서 정확히 인식됨 (유사도 '+(bestSim*100).toFixed(0)+'%)'};
    }else if(bestSim>=0.7){
      v={cls:'v-near',title:'정답 (발음 차이 있음)',sub:'문제 단어 "'+esc(target)+'" 유사도 '+(bestSim*100).toFixed(0)+'% — 인식되었으나 정확하지 않음'};
    }else{
      var heardS=alts[0]?alts[0].t:'';
      var r=heardS?'문제 단어 "'+esc(target)+'" 를 문장에서 못 찾음 — 가장 가까운 발음 "'+esc(bestWord)+'" ('+(bestSim*100).toFixed(0)+'%)':'인식 결과 없음';
      v={cls:'v-no',title:'오답',sub:'사유: '+r};
    }
  }else{
    var heard0=alts[0]?alts[0].t:'';
    if(bestSim>=0.85){
      v={cls:'v-ok',title:'정답',sub:'정확하게 인식됨 (유사도 '+(bestSim*100).toFixed(0)+'%)'};
    }else if(bestSim>=0.7){
      v={cls:'v-near',title:'정답 (발음 차이 있음)',sub:'유사도 '+(bestSim*100).toFixed(0)+'% — 인식되었으나 정확하지 않음'};
    }else{
      var reason=heard0?'다른 단어로 인식됨 "'+esc(heard0)+'" — 목표와 유사도 '+(bestSim*100).toFixed(0)+'%':'인식 결과 없음 — 발음이 약하거나 무음';
      v={cls:'v-no',title:'오답',sub:'사유: '+reason};
    }
  }
  html+='<div class="verdict '+v.cls+'">'+v.title+'<br>'+
    '<span style="font-size:12px;font-weight:400;">'+v.sub+'</span></div>';
  $('result').innerHTML=html;
}

// 최근 7일(5/16~5/22) 단어 말하기에서 3차 AI 로 넘어간 단어 — 빈도순
// (한글 섞인 패턴·변화형 표기 제외, 빈도 2회 이상)
// [단어, 빈도, 한글발음표기, 3차 문장(기초 단어·목표 가운데), 부적합 사유, 문장 해석]
var AI_WORDS=[
  ['whip',15,'윕','He will whip the cream','','그는 크림을 휘저을 것이다'],
  ['stuff',14,'스터프','Put your stuff in the bag','','가방에 네 물건을 넣어라'],
  ['trick',11,'트릭','The magic trick made us happy','','그 마술 묘기는 우리를 즐겁게 했다'],
  ['feel',11,'필','Today I feel much better','','오늘 나는 훨씬 더 좋게 느낀다'],
  ['blob',10,'블롭','A big blob of paint fell','','큰 페인트 방울이 떨어졌다'],
  ['roll up',9,'롤 업','Please roll up the paper','','종이를 말아 주세요'],
  ['wild',8,'와일드','I saw a wild horse','','나는 야생 말을 보았다'],

  ['be destroyed',8,'비 디스트로이드','The old house will be destroyed soon','','그 낡은 집은 곧 파괴될 것이다'],
  ['astound',7,'어스타운드','The magic will astound the kids','','그 마술은 아이들을 놀라게 할 것이다'],
  ['amaze',7,'어메이즈','Magic tricks always amaze kids','','마술은 항상 아이들을 놀라게 한다'],
  ['ought to',7,'오트 투','You really ought to sleep','','너는 정말 잠을 자야 한다'],
  ['very',7,'베리','The soup is very hot','','그 수프는 매우 뜨겁다'],
  ['pass',7,'패스','Can you pass the salt','','소금 좀 건네줄래?'],
  ['smell',7,'스멜','I can smell fresh bread','','나는 신선한 빵 냄새를 맡을 수 있다'],
  ['cans of squirt cheese',6,'캔즈 오브 스쿼트 치즈','She bought cans of squirt cheese today','','그녀는 오늘 스프레이 치즈 캔을 샀다'],

  ['fuel',5,'퓨얼','The car needs fuel now','','그 차는 지금 연료가 필요하다'],
  ['squirt',5,'스쿼트','The kids squirt water outside','','아이들이 밖에서 물을 뿜는다'],
  ['horn',5,'혼','The car horn is very loud','','그 차 경적은 매우 시끄럽다'],
  ['pirate treasure',4,'파이럿 트레저','They found pirate treasure here','','그들은 여기서 해적 보물을 찾았다'],
  ['go wild',4,'고 와일드','The fans go wild outside','','팬들이 밖에서 열광한다'],
  ['door',4,'도어','Please close the door now','','지금 문을 닫아 주세요'],
  ['as though',4,'애즈 도우','He acts as though he knows','','그는 마치 아는 것처럼 행동한다'],
  ['claim',4,'클레임','She will claim the prize','','그녀는 그 상을 요구할 것이다'],
  ['be replaced',3,'비 리플레이스드','The old light will be replaced soon','','그 낡은 전등은 곧 교체될 것이다'],
  ['gooey',3,'구이','I like the gooey cheese','','나는 끈적한 치즈를 좋아한다'],

(function(){
  var sel=$('wordPick');
  var o0=document.createElement('option');
  o0.value='';o0.textContent='— 목록에서 선택 (직접 입력도 가능) —';
  sel.appendChild(o0);
  AI_WORDS.forEach(function(p){
    var o=document.createElement('option');
    o.value=p[0];o.textContent=p[0]+'  ('+p[1]+'회)'+(p[4]?'  ⚠ 부적합':'');
    sel.appendChild(o);
  });
})();
function pickWord(){
  var v=$('wordPick').value;
  if(!v)return;
  var f=null;
  for(var i=0;i<AI_WORDS.length;i++){if(AI_WORDS[i][0]===v){f=AI_WORDS[i];break;}}
  $('targetWord').value=v;
  $('targetKo').value=f&&f[2]?f[2]:'';
  $('targetSent').value=f&&f[3]?f[3]:'';
  $('targetSentKo').value=f&&f[5]?f[5]:'';
  showUnfit(f&&f[4]?f[4]:'');
}
function showUnfit(reason){
  $('unfit').innerHTML=reason?'<div class="unfit">말하기 부적합 단어 — 사유: '+esc(reason)+'</div>':'';
}
function playWord(){
  var w=$('targetWord').value.trim();
  if(!w)return;
  if(!window.speechSynthesis){alert('이 브라우저는 음성 합성(TTS)을 지원하지 않습니다.');return;}
  try{
    speechSynthesis.cancel();
    var u=new SpeechSynthesisUtterance(w);
    u.lang='en-US';u.rate=0.9;
    speechSynthesis.speak(u);
  }catch(e){}
}
</script>
