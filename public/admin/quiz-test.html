<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI 문제 생성 테스트</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; background: #fafafa; color: #222; }
  h1 { font-size: 20px; margin: 0 0 10px; }
  .sub { color: #888; font-size: 12px; margin-bottom: 16px; }
  textarea, input, select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-family: inherit; font-size: 13px; box-sizing: border-box; }
  textarea { min-height: 140px; font-family: ui-monospace, monospace; }
  label { font-weight: 600; font-size: 12px; margin: 10px 0 4px; display: block; }
  .row { display: flex; gap: 8px; }
  .row > div { flex: 1; }
  button { background: #E8714A; color: #fff; border: 0; padding: 10px 18px; border-radius: 4px; font-weight: 600; cursor: pointer; margin-top: 12px; }
  button:disabled { opacity: 0.5; }
  .status { font-size: 12px; color: #888; margin: 10px 0; }
  .q { background: #fff; border: 1px solid #e0e0e0; border-radius: 6px; padding: 12px; margin-bottom: 8px; }
  .q-en { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .q-ko { font-size: 12px; color: #666; margin-bottom: 8px; }
  .choice { padding: 6px 10px; background: #f5f5f5; border-radius: 4px; margin-bottom: 4px; font-size: 12px; }
  .answer { background: #e8f5e9; border: 1px solid #4caf50; font-weight: 600; }
  .meta { font-size: 10px; color: #aaa; margin-top: 6px; font-family: monospace; }
  .diff { font-size: 10px; padding: 1px 6px; border-radius: 8px; margin-left: 6px; }
  .diff-easy { background: #e8f5e9; color: #2e7d32; }
  .diff-medium { background: #fff3e0; color: #e65100; }
  .diff-hard { background: #ffebee; color: #c62828; }
  .err { background: #fee; color: #c33; padding: 10px; border-radius: 4px; font-size: 13px; }
  details { margin-top: 10px; font-size: 12px; }
  pre { background: #f4f4f4; padding: 8px; font-size: 10px; overflow-x: auto; max-height: 300px; }
  .expl { font-size: 11px; color: #666; margin-top: 6px; background: #fff8e1; padding: 6px 8px; border-left: 2px solid #ffc107; }
</style>
</head>
<body>
<h1>🤖 AI 문제 생성 API 테스트</h1>
<div class="sub">POST /api/generate-quiz · Gemini 3.1 Flash-Lite</div>

<label>본문</label>
<textarea id="passage">The sun was setting over the quiet village. A young girl named Mia walked home from school with her best friend. They talked about the science project they had to finish by Friday. "I don't understand the part about photosynthesis," Mia said. Her friend smiled and promised to help her after dinner. Suddenly, they heard a strange sound coming from the old barn. Mia wanted to check it out, but her friend was too scared. They decided to come back tomorrow with a flashlight.</textarea>

<div class="row">
  <div>
    <label>Page ID</label>
    <input type="text" id="pageId" value="test-001">
  </div>
  <div>
    <label>Title</label>
    <input type="text" id="pageTitle" value="Test">
  </div>
  <div>
    <label>문제 수</label>
    <input type="number" id="count" value="5" min="1" max="20">
  </div>
</div>

<button onclick="run()" id="btn">✨ 생성</button>
<div class="status" id="status"></div>
<div id="result"></div>

<script>
async function run() {
  const btn = document.getElementById('btn');
  const status = document.getElementById('status');
  const result = document.getElementById('result');
  btn.disabled = true;
  status.textContent = '🤖 호출 중...';
  result.innerHTML = '';

  const t0 = Date.now();
  try {
    const res = await fetch('/api/generate-quiz', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        pages: [{
          id: document.getElementById('pageId').value,
          title: document.getElementById('pageTitle').value,
          text: document.getElementById('passage').value,
        }],
        count: parseInt(document.getElementById('count').value) || 5,
        type: 'mcq',
      }),
    });
    const data = await res.json();
    const sec = ((Date.now() - t0) / 1000).toFixed(1);

    if (!data.success) {
      status.innerHTML = `<span style="color:#c33;">❌ ${sec}s</span>`;
      result.innerHTML = `<div class="err">${esc(data.error)} ${data.detail?'<br>'+esc(data.detail):''}</div>`;
      return;
    }

    status.innerHTML = `✓ ${sec}s · model: <b>${esc(data.model)}</b> · ${data.returnedCount}/${data.requestedCount}문제`;
    result.innerHTML = data.questions.map((q, i) => {
      const diff = { easy:'쉬움', medium:'보통', hard:'어려움' }[q.difficulty] || q.difficulty;
      return `<div class="q">
        <div class="q-en">${i+1}. ${esc(q.question)}<span class="diff diff-${q.difficulty}">${esc(diff)}</span></div>
        <div class="q-ko">${esc(q.questionKo)}</div>
        ${q.choices.map((c,j)=>`<div class="choice ${c.isAnswer?'answer':''}">${['①','②','③','④'][j]} ${esc(c.text)}${c.isAnswer?' ✓':''}</div>`).join('')}
        ${q.explanation?`<div class="expl">💡 ${esc(q.explanation)}</div>`:''}
        <div class="meta">${esc(q.sourcePageId)}</div>
      </div>`;
    }).join('') + `<details><summary>Raw JSON</summary><pre>${esc(JSON.stringify(data,null,2))}</pre></details>`;
  } catch (e) {
    status.innerHTML = `<span style="color:#c33;">❌ 네트워크 에러</span>`;
    result.innerHTML = `<div class="err">${esc(e.message)}</div>`;
  } finally {
    btn.disabled = false;
  }
}
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
</script>
</body>
</html>
