<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>단어 말하기 모의 시험</title>
<style>
*{box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  max-width:560px;margin:0 auto;padding:16px;background:#f5f6f8;color:#222;
  -webkit-tap-highlight-color:transparent;}
h1{font-size:21px;margin:6px 0;}
.muted{color:#888;font-size:13px;line-height:1.6;}
.card{background:#fff;border-radius:14px;padding:18px;margin:12px 0;
  box-shadow:0 1px 6px rgba(0,0,0,.08);}
.numbtns{display:flex;gap:10px;margin-top:14px;}
.numbtns button{flex:1;padding:18px 0;font-size:17px;}
button{border:none;border-radius:12px;color:#fff;font-weight:700;cursor:pointer;
  background:#2563eb;}
button:disabled{opacity:.45;}
button:active{transform:scale(.97);}
#progress{font-size:13px;color:#64748b;font-weight:700;text-align:center;margin:4px 0 10px;}
.qcard{background:#fff;border-radius:14px;padding:22px 18px;
  box-shadow:0 1px 6px rgba(0,0,0,.08);text-align:center;}
#qSent{font-size:23px;font-weight:700;line-height:1.6;color:#111;}
.blank{display:inline-block;min-width:80px;border-bottom:3px solid #2563eb;
  color:transparent;}
#qSentKo{font-size:15px;color:#475569;margin-top:14px;line-height:1.6;}
.hl{background:#fde68a;padding:1px 6px;border-radius:4px;font-weight:700;color:#92400e;}
#qStage{margin:16px 0 4px;font-weight:700;font-size:14px;color:#7c3aed;text-align:center;}
.live{min-height:40px;border:2px dashed #cbd5e1;border-radius:10px;padding:10px;
  margin:8px 0;font-size:19px;text-align:center;color:#334155;}
.micwrap{text-align:center;margin:10px 0;}
#micBtn{width:130px;height:130px;border-radius:50%;font-size:17px;
  background:#16a34a;box-shadow:0 4px 14px rgba(22,163,74,.35);}
#micBtn.rec{background:#dc2626;box-shadow:0 4px 14px rgba(220,38,38,.4);}
.status{margin-top:10px;padding:12px;border-radius:10px;font-size:15px;
  font-weight:700;text-align:center;line-height:1.5;background:#f1f5f9;color:#334155;}
.status.ok{background:#dcfce7;color:#15803d;}
.status.no{background:#fee2e2;color:#b91c1c;}
.status.retry{background:#fef3c7;color:#b45309;}
#score{text-align:center;}
#score .big{font-size:48px;font-weight:800;color:#2563eb;}
.ritem{display:flex;justify-content:space-between;padding:10px 12px;
  border-radius:8px;margin:6px 0;font-size:14px;font-weight:700;}
.r-ok{background:#dcfce7;color:#15803d;}
.r-near{background:#fef3c7;color:#b45309;}
.r-no{background:#fee2e2;color:#b91c1c;}
.fullbtn{width:100%;padding:16px;font-size:16px;margin-top:14px;}
</style>
</head>
<body>

<div id="startScreen">
  <h1>단어 말하기 모의 시험</h1>
  <div class="card">
    <div class="muted">
      빈칸에 들어갈 영어 단어를 말하는 시험입니다.<br>
      해석의 <span class="hl">노란 부분</span>이 빈칸 단어의 뜻입니다.<br><br>
      단어만 말해도, 문장 전체를 읽어도 됩니다.<br>
      잘 인식되지 않으면 2·3차로 다시 기회가 주어집니다.
    </div>
    <div style="font-weight:700;margin-top:16px;">문제 수를 선택하세요</div>
    <div class="numbtns">
      <button onclick="startExam(5)">5문제</button>
      <button onclick="startExam(10)">10문제</button>
      <button onclick="startExam(20)">20문제</button>
    </div>
  </div>
  <div class="muted" id="ua"></div>
</div>

<div id="quizScreen" style="display:none;">
  <div id="progress"></div>
  <div class="qcard">
    <div id="qSent"></div>
    <div id="qSentKo"></div>
  </div>
  <div id="qStage"></div>
  <div class="live" id="qLive"></div>
  <div class="micwrap"><button id="micBtn" onclick="speak()">말하기</button></div>
  <div class="status" id="qStatus"></div>
</div>

<div id="resultScreen" style="display:none;">
  <h1>시험 결과</h1>
  <div class="card">
    <div id="score"></div>
  </div>
  <div class="card">
    <div style="font-weight:700;font-size:13px;color:#475569;margin-bottom:6px;">문항별 결과</div>
    <div id="itemList"></div>
  </div>
  <button class="fullbtn" onclick="location.reload()">다시 하기</button>
</div>

<script>
var $=function(id){return document.getElementById(id);};
$('ua').textContent=navigator.userAgent;

function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){
  return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function reEsc(s){return String(s||'').replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}

function lev(a,b){
  a=a||'';b=b||'';
  var m=a.length,n=b.length;
  if(!m)return n;if(!n)return m;
  var d=[],i,j;
  for(i=0;i<=m;i++)d[i]=[i];
  for(j=0;j<=n;j++)d[0][j]=j;
  for(i=1;i<=m;i++)for(j=1;j<=n;j++){
    var c=a[i-1]===b[j-1]?0:1;
    d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+c);
  }
  return d[m][n];
}
function sim(a,b){
  a=(a||'').toLowerCase().trim();b=(b||'').toLowerCase().trim();
  if(!a&&!b)return 1;
  var L=Math.max(a.length,b.length);
  if(!L)return 0;
  return 1-lev(a,b)/L;
}
function simNoSpace(a,b){
  return sim((a||'').replace(/\s/g,''),(b||'').replace(/\s/g,''));
}
// 문장에서 목표(한 단어 또는 구)만 찾아 비교 — 다른 단어는 비교 X
function bestPhraseSim(sentence,target){
  var sw=(sentence||'').toLowerCase().replace(/[^a-z'\s가-힣]/g,' ').split(/\s+/).filter(Boolean);
  var tw=(target||'').toLowerCase().split(/\s+/).filter(Boolean);
  var n=tw.length;
  if(!n||!sw.length)return 0;
  var tj=tw.join(''),best=0;
  for(var i=0;i+n<=sw.length;i++){
    var win=sw.slice(i,i+n);
    var s=Math.max(sim(win.join(' '),tw.join(' ')),sim(win.join(''),tj));
    if(s>best)best=s;
  }
  if(n>1)for(var j=0;j<sw.length;j++){
    var s2=sim(sw[j],tj);
    if(s2>best)best=s2;
  }
  return best;
}

// [단어, 빈도, 한글발음표기, 영어문장, 부적합사유, 해석([]=빈칸 단어 뜻)]

var POOL=AI_WORDS.filter(function(w){return !w[4];});  // 부적합 단어 제외

var EX={items:[],idx:0,stage:1,results:[],rec:null};

function shuffle(a){
  a=a.slice();
  for(var i=a.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1)),t=a[i];a[i]=a[j];a[j]=t;
  }
  return a;
}
function show(id){
  ['startScreen','quizScreen','resultScreen'].forEach(function(s){
    $(s).style.display=s===id?'block':'none';
  });
}
function startExam(n){
  EX.items=shuffle(POOL).slice(0,Math.min(n,POOL.length));
  EX.idx=0;EX.results=[];
  show('quizScreen');
  renderQ();
}
function renderQ(){
  var it=EX.items[EX.idx];
  EX.stage=1;
  $('progress').textContent='문제 '+(EX.idx+1)+' / '+EX.items.length;
  var re=new RegExp('\\b'+reEsc(it[0])+'\\b','i');
  $('qSent').innerHTML=esc(it[3]).replace(re,'<span class="blank">'+esc(it[0])+'</span>');
  $('qSentKo').innerHTML=esc(it[5]).replace(/\[([^\]]+)\]/g,'<span class="hl">$1</span>');
  $('qLive').textContent='';
  setStage();
  $('micBtn').disabled=false;
}
function setStage(){
  var msg=EX.stage===1?'마이크를 누르고 빈칸 단어를 말하세요 (단어만, 또는 문장 전체)':
    EX.stage===2?'다시 한번 — 빈칸 단어를 또박또박 말하세요':
    '마지막 — 문장 전체를 또박또박 읽어보세요';
  $('qStage').textContent=EX.stage+'차 시도';
  $('qStatus').textContent=msg;
  $('qStatus').className='status';
}
function speak(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('이 브라우저는 음성 인식을 지원하지 않습니다.');return;}
  if(EX.rec){try{EX.rec.abort();}catch(e){}}
  var it=EX.items[EX.idx];
  var rec=new SR();
  EX.rec=rec;
  rec.lang=EX.stage===2?'ko-KR':'en-US';
  rec.continuous=false;rec.interimResults=true;rec.maxAlternatives=5;
  $('micBtn').disabled=true;
  $('micBtn').textContent='듣는 중...';
  $('micBtn').className='rec';
  $('qLive').textContent='';
  var finalRes=null;
  rec.onresult=function(e){
    var interim='';
    for(var i=0;i<e.results.length;i++){
      var r=e.results[i];
      if(r.isFinal)finalRes=r;else interim+=r[0].transcript;
    }
    $('qLive').textContent=interim||(finalRes?finalRes[0].transcript:'');
  };
  rec.onerror=function(){};
  rec.onend=function(){
    $('micBtn').disabled=false;
    $('micBtn').textContent='말하기';
    $('micBtn').className='';
    grade(it,finalRes);
  };
  try{rec.start();}catch(e){
    $('micBtn').disabled=false;$('micBtn').textContent='말하기';$('micBtn').className='';
  }
}
function grade(it,finalRes){
  var target=it[0],heard='',best=0;
  if(finalRes){
    heard=finalRes[0].transcript||'';
    for(var i=0;i<finalRes.length;i++){
      var t=finalRes[i].transcript||'';
      var s=EX.stage===2?simNoSpace(t,it[2]):bestPhraseSim(t,target);
      if(s>best)best=s;
    }
  }
  $('qLive').textContent=heard||'(인식 결과 없음)';
  if(best>=0.7){
    var msg=EX.stage===1?'정답!':
      EX.stage===2?'정답! 영어 발음을 조금 더 또박또박 연습해볼까요?':
      '정답! 문장으로 잘 읽었어요';
    $('qStatus').textContent=msg;
    $('qStatus').className='status ok';
    EX.results.push({word:target,correct:true,stage:EX.stage});
    $('micBtn').disabled=true;
    setTimeout(nextQ,1600);
  }else if(EX.stage<3){
    EX.stage++;
    setStage();
    $('qStatus').textContent='다르게 들렸어요 — '+$('qStatus').textContent;
    $('qStatus').className='status retry';
  }else{
    $('qStatus').textContent='아쉬워요. 정답은 "'+esc(target)+'" 입니다.';
    $('qStatus').className='status no';
    EX.results.push({word:target,correct:false,stage:0});
    $('micBtn').disabled=true;
    setTimeout(nextQ,2400);
  }
}
function nextQ(){
  EX.idx++;
  if(EX.idx>=EX.items.length)showResult();
  else renderQ();
}
function showResult(){
  show('resultScreen');
  var correct=EX.results.filter(function(r){return r.correct;}).length;
  var total=EX.results.length||1;
  $('score').innerHTML='<div class="big">'+correct+' / '+EX.results.length+'</div>'+
    '<div style="font-size:18px;font-weight:700;color:#475569;">'+Math.round(correct/total*100)+'점</div>';
  var html='';
  EX.results.forEach(function(r,i){
    var label,cls;
    if(!r.correct){label='오답';cls='r-no';}
    else if(r.stage===1){label='1차 통과';cls='r-ok';}
    else if(r.stage===2){label='2차 통과 (발음 연습 권장)';cls='r-near';}
    else {label='3차 통과 (문장으로)';cls='r-near';}
    html+='<div class="ritem '+cls+'"><span>'+(i+1)+'. '+esc(r.word)+'</span><span>'+label+'</span></div>';
  });
  $('itemList').innerHTML=html;
}
</script>
</body>
</html>
