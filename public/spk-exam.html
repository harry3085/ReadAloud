<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#E8714A">
<title>단어 말하기 모의 시험</title>
<style>
*{box-sizing:border-box;}
html,body{height:100%;margin:0;}
:root{
  --teal:#E8714A;--teal-dark:#D85A30;--cream:#FFF0E8;
  --grad:linear-gradient(160deg,#E8714A,#D85A30);
  --text:#222;--gray:#888;--bg:#FFF8F5;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;}
.screen{min-height:100vh;display:flex;flex-direction:column;background:var(--bg);
  max-width:560px;margin:0 auto;}

/* 시작 화면 */
.start-hero{background:var(--grad);padding:54px 28px 40px;text-align:center;color:#fff;}
.start-hero h1{font-size:24px;margin:0;font-weight:800;}
.start-hero p{font-size:13px;opacity:.9;margin:8px 0 0;}
.start-body{padding:22px 20px;}
.info-card{background:#fff;border-radius:18px;padding:20px;
  box-shadow:0 4px 16px rgba(232,113,74,.12);}
.info-card .desc{font-size:14px;color:#555;line-height:1.7;}
.info-card .hl-inline{background:#fde68a;padding:1px 6px;border-radius:4px;
  color:#92400e;font-weight:700;}
.picklabel{font-weight:700;margin:18px 0 10px;font-size:14px;}
.numbtns{display:flex;gap:10px;}
.numbtns button{flex:1;padding:20px 0;font-size:17px;font-weight:700;border:0;
  border-radius:14px;background:var(--grad);color:#fff;cursor:pointer;
  box-shadow:0 3px 10px rgba(232,113,74,.3);}
.numbtns button:active{transform:scale(.97);}

/* 시험 화면 */
.quiz-header{display:flex;align-items:center;gap:12px;padding:18px 20px 6px;flex-shrink:0;}
.progress-bar-wrap{flex:1;height:8px;background:var(--cream);border-radius:4px;}
.progress-bar-fill{height:8px;background:var(--teal);border-radius:4px;transition:width .3s;}
.progress-pill{font-size:12px;font-weight:700;color:var(--teal);min-width:48px;text-align:right;}
.stage-note{text-align:center;font-size:12px;color:var(--gray);font-weight:600;
  margin:6px 0 4px;flex-shrink:0;}

.qcard{margin:6px 16px 0;background:#fff;border-radius:20px;overflow:hidden;
  box-shadow:0 4px 16px rgba(232,113,74,.12);flex-shrink:0;}
.qcard-head{background:var(--grad);padding:20px 18px;}
.qcard-head .label{font-size:11px;color:rgba(255,255,255,.8);margin-bottom:6px;}
.qcard-head .big{font-size:25px;font-weight:800;color:#fff;line-height:1.45;
  word-break:break-word;}
.qcard-body{padding:16px 18px;min-height:84px;}
.body-label{font-size:12px;color:var(--gray);text-align:center;margin-bottom:8px;}
.qsent{font-size:20px;font-weight:700;line-height:1.7;color:#111;text-align:center;}
.qko{font-size:14px;color:#475569;line-height:1.6;text-align:center;margin-top:12px;}
.hl{background:#fde68a;padding:1px 6px;border-radius:4px;color:#92400e;font-weight:700;}
.blankhl{display:inline-block;min-width:70px;height:1em;background:#fde68a;
  border-bottom:3px solid #f59e0b;border-radius:3px;vertical-align:-3px;}

/* 정답칸 빈칸 스펠링 */
.ansslot{text-align:center;padding:6px 0;}
.slot-hint-msg{color:var(--gray);font-size:13px;}
.sp-box{display:inline-block;border-bottom:3px solid var(--teal);text-align:center;
  font-weight:800;color:var(--teal);}
.ansslot .sp-box{width:30px;height:40px;line-height:40px;font-size:23px;margin:0 4px;}
.ansslot .sp-gap{display:inline-block;width:16px;}
.spell-inline .sp-box{width:15px;height:1em;line-height:1em;font-size:.82em;
  margin:0 2px;border-bottom-width:2px;vertical-align:-2px;}
.spell-inline .sp-gap{display:inline-block;width:7px;}

.spacer{flex:1;}
.live{margin:8px 16px 0;min-height:42px;border:2px dashed #e5d5cc;border-radius:12px;
  padding:10px;font-size:19px;text-align:center;color:#334155;flex-shrink:0;}
.miczone{display:flex;justify-content:center;padding:12px 0;flex-shrink:0;}
.micbtn{width:104px;height:104px;border-radius:50%;background:var(--teal);color:#fff;
  font-size:44px;border:0;cursor:pointer;box-shadow:0 4px 16px rgba(232,113,74,.35);
  transition:.15s;}
.micbtn.rec{background:#dc2626;box-shadow:0 4px 16px rgba(220,38,38,.4);}
.micbtn:disabled{opacity:.5;}
.micbtn:active{transform:scale(.96);}
.status{margin:10px 16px 0;padding:13px;border-radius:12px;font-size:15px;font-weight:700;
  text-align:center;line-height:1.5;background:var(--cream);color:var(--teal-dark);
  flex-shrink:0;}
.status b{font-size:19px;}
.status.ok{background:#dcfce7;color:#15803d;}
.status.no{background:#fee2e2;color:#b91c1c;}
.status.retry{background:#fef3c7;color:#b45309;}

/* 하단 버튼 줄 — 힌트 / 다음 / SKIP */
.btnrow{display:flex;gap:8px;margin:12px 16px 18px;flex-shrink:0;}
.rowbtn{flex:1;padding:15px 0;font-size:15px;font-weight:700;border:0;
  border-radius:12px;cursor:pointer;}
.rowbtn.hint{background:#fff;border:2px solid var(--teal);color:var(--teal);}
.rowbtn.next{background:var(--teal);color:#fff;
  box-shadow:0 2px 8px rgba(232,113,74,.3);}
.rowbtn.skip{background:#f1f5f9;color:var(--gray);}
.rowbtn:disabled{opacity:.4;}
.rowbtn:active{transform:scale(.97);}

/* 결과 화면 */
.result-hero{background:var(--grad);padding:44px 20px;text-align:center;color:#fff;}
.result-hero h1{font-size:22px;margin:0 0 14px;font-weight:800;}
.result-score{font-size:60px;font-weight:800;line-height:1;}
.result-sub{font-size:16px;font-weight:700;opacity:.9;margin-top:6px;}
.result-body{padding:18px 16px;}
.rlist-title{font-size:13px;font-weight:700;color:#475569;margin:4px 4px 8px;}
.ritem{display:flex;justify-content:space-between;align-items:center;
  padding:11px 14px;border-radius:12px;margin:6px 0;font-size:14px;font-weight:700;
  background:#fff;box-shadow:0 1px 5px rgba(0,0,0,.06);}
.rtag{font-size:12px;font-weight:700;padding:3px 9px;border-radius:8px;}
.t-ok{background:#dcfce7;color:#15803d;}
.t-near{background:#fef3c7;color:#b45309;}
.t-no{background:#fee2e2;color:#b91c1c;}
.fullbtn{margin:16px;padding:16px;font-size:16px;font-weight:700;border:0;
  border-radius:14px;background:var(--teal);color:#fff;cursor:pointer;}
.uatxt{font-size:11px;color:#bbb;padding:0 20px 16px;word-break:break-all;}
</style>
</head>
<body>

<div id="startScreen" class="screen">
  <div class="start-hero">
    <h1>단어 말하기 모의 시험</h1>
    <p>한글 뜻을 보고 영어 단어를 말해보세요</p>
  </div>
  <div class="start-body">
    <div class="info-card">
      <div class="desc">
        1·2차 — 한글 뜻만 보고 단어를 말합니다.<br>
        3차 — 문장이 공개되며 문장 전체를 읽습니다.<br>
        단어가 떠오르지 않으면 <span class="hl-inline">힌트</span>로
        스펠링을 2글자까지 볼 수 있습니다.
      </div>
      <div class="picklabel">문제 수를 선택하세요</div>
      <div class="numbtns">
        <button onclick="startExam(5)">5문제</button>
        <button onclick="startExam(10)">10문제</button>
        <button onclick="startExam(20)">20문제</button>
      </div>
    </div>
    <div class="uatxt" id="ua"></div>
  </div>
</div>

<div id="quizScreen" class="screen" style="display:none;">
  <div class="quiz-header">
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="pBar" style="width:0%;"></div></div>
    <div class="progress-pill" id="pPill"></div>
  </div>
  <div class="stage-note" id="stageNote"></div>
  <div class="qcard">
    <div class="qcard-head" id="qHead"></div>
    <div class="qcard-body" id="qBody"></div>
  </div>
  <div class="status" id="qStatus"></div>
  <div class="spacer"></div>
  <div class="live" id="qLive" style="display:none;"></div>
  <div class="miczone"><button class="micbtn" id="micBtn" onclick="speak()">🎤</button></div>
  <div class="btnrow">
    <button class="rowbtn hint" id="hintBtn" onclick="useHint()">힌트</button>
    <button class="rowbtn next" id="nextBtn" onclick="goNext()" disabled>다음</button>
    <button class="rowbtn skip" id="skipBtn" onclick="skipQ()">SKIP</button>
  </div>
</div>

<div id="resultScreen" class="screen" style="display:none;">
  <div class="result-hero">
    <h1>시험 결과</h1>
    <div class="result-score" id="scoreNum"></div>
    <div class="result-sub" id="scoreSub"></div>
  </div>
  <div class="result-body">
    <div class="rlist-title">문항별 결과</div>
    <div id="itemList"></div>
    <button class="fullbtn" onclick="location.reload()">다시 하기</button>
  </div>
</div>

<script>
var $=function(id){return document.getElementById(id);};
$('ua').textContent=navigator.userAgent;

function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){
  return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function reEsc(s){return String(s||'').replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}

function lev(a,b){
  a=a||'';b=b||'';
  var m=a.length,n=b.length;
  if(!m)return n;if(!n)return m;
  var d=[],i,j;
  for(i=0;i<=m;i++)d[i]=[i];
  for(j=0;j<=n;j++)d[0][j]=j;
  for(i=1;i<=m;i++)for(j=1;j<=n;j++){
    var c=a[i-1]===b[j-1]?0:1;
    d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+c);
  }
  return d[m][n];
}
function sim(a,b){
  a=(a||'').toLowerCase().trim();b=(b||'').toLowerCase().trim();
  if(!a&&!b)return 1;
  var L=Math.max(a.length,b.length);
  if(!L)return 0;
  return 1-lev(a,b)/L;
}
function simNoSpace(a,b){
  return sim((a||'').replace(/\s/g,''),(b||'').replace(/\s/g,''));
}
function bestPhraseSim(sentence,target){
  var sw=(sentence||'').toLowerCase().replace(/[^a-z'\s가-힣]/g,' ').split(/\s+/).filter(Boolean);
  var tw=(target||'').toLowerCase().split(/\s+/).filter(Boolean);
  var n=tw.length;
  if(!n||!sw.length)return 0;
  var tj=tw.join(''),best=0;
  for(var i=0;i+n<=sw.length;i++){
    var win=sw.slice(i,i+n);
    var s=Math.max(sim(win.join(' '),tw.join(' ')),sim(win.join(''),tj));
    if(s>best)best=s;
  }
  if(n>1)for(var j=0;j<sw.length;j++){
    var s2=sim(sw[j],tj);
    if(s2>best)best=s2;
  }
  return best;
}

  ['pack up',2,'팩 업','Please pack up your school things','','네 학교 물건을 [챙겨라]','(짐을) 싸다, 챙기다'],
  ['trouble',2,'트러블','He got into trouble at school','','그는 학교에서 [곤란]에 빠졌다','곤란, 문제'],
  ['strange',2,'스트레인지','I heard a strange loud sound','','나는 [이상한] 큰 소리를 들었다','이상한'],
  ['sholy',2,'숄리','sholy','사전에 없는 단어','[사전에 없는 단어]','사전에 없는 단어'],
  ['meat-thing',2,'미트 씽','He cooked a strange meat-thing','사전에 없는 조어','그는 이상한 [고기 같은 것]을 요리했다','사전에 없는 조어'],
  ['gag',2,'개그','The funny gag made us laugh','3글자 짧은 단어','그 웃긴 [개그]는 우리를 웃게 했다','개그, 익살'],
  ['material',2,'머티리얼','This soft material feels nice','','이 부드러운 [재료]는 느낌이 좋다','재료, 물질'],
  ['pursuit',2,'퍼슈트','He runs in pursuit of dreams','','그는 꿈을 [좇아] 달린다','추구'],
  ['in terms of',2,'인 텀즈 오브','It is cheap in terms of price','','그것은 가격 [면에서] 싸다','~의 면에서, ~의 관점에서'],
  ['whisper',2,'위스퍼','We must whisper in the library','','우리는 도서관에서 [속삭여야] 한다','속삭이다'],
  ['choo choo',2,'추 추','The choo choo train moved fast','의성어 — 기차 소리','그 [칙칙폭폭] 기차가 빠르게 움직였다','칙칙폭폭 (의성어)'],
  ['rooster',2,'루스터','The loud rooster calls every morning','','시끄러운 [수탉]이 매일 아침 운다','수탉'],
  ['volleyball',2,'발리볼','We often play volleyball after school','','우리는 방과 후에 자주 [배구]를 한다','배구'],
  ['rental shop',2,'렌탈 샵','The small rental shop opens early','','그 작은 [대여점]은 일찍 연다','대여점']
];
var POOL=AI_WORDS.filter(function(w){return !w[4];});

var EX={items:[],idx:0,stage:1,hint:0,results:[],rec:null};

function shuffle(a){
  a=a.slice();
  for(var i=a.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1)),t=a[i];a[i]=a[j];a[j]=t;
  }
  return a;
}
function show(id){
  ['startScreen','quizScreen','resultScreen'].forEach(function(s){
    $(s).style.display=s===id?'flex':'none';
  });
}
function startExam(n){
  EX.items=shuffle(POOL).slice(0,Math.min(n,POOL.length));
  EX.idx=0;EX.results=[];
  show('quizScreen');
  renderQ();
}
function meaningOf(it){return it[6]||it[0];}

function renderQ(){
  EX.stage=1;EX.hint=0;
  $('pPill').textContent=(EX.idx+1)+' / '+EX.items.length;
  $('pBar').style.width=Math.round((EX.idx+1)/EX.items.length*100)+'%';
  $('nextBtn').disabled=true;
  $('skipBtn').disabled=false;
  $('micBtn').disabled=false;
  renderStageView();
}
function renderStageView(){
  var it=EX.items[EX.idx];
  $('stageNote').textContent=EX.stage+'차 시도';
  // 헤더 — 한글 뜻 (1·2·3차 모두 동일하게 유지)
  $('qHead').innerHTML='<div class="label">이 뜻의 영어 단어</div>'+
    '<div class="big">'+esc(meaningOf(it))+'</div>';
  if(EX.stage<3){
    $('qBody').innerHTML='<div class="ansslot" id="ansSlot"></div>';
    $('qLive').style.display='none';
    $('qStatus').textContent=EX.stage===1?'마이크를 누르고 말하세요':
      '다시 한번 — 단어를 또박또박 말하세요';
  }else{
    $('qBody').innerHTML='<div class="body-label">아래 문장을 읽어보세요</div>'+
      '<div class="qsent" id="qSent"></div>'+
      '<div class="qko">'+esc(it[5]).replace(/\[([^\]]+)\]/g,'<span class="hl">$1</span>')+'</div>';
    $('qLive').style.display='block';
    $('qLive').textContent='';
    $('qStatus').textContent='문장 전체를 또박또박 읽어보세요';
  }
  $('qStatus').className='status';
  renderAnswerSlot();
  updateHintBtn();
}
function spellBoxes(word){
  return word.split('').map(function(c,i){
    if(c===' ')return '<span class="sp-gap"></span>';
    return '<span class="sp-box">'+(i<EX.hint?esc(c):'')+'</span>';
  }).join('');
}
function renderAnswerSlot(){
  var it=EX.items[EX.idx],w=it[0];
  if(EX.stage<3){
    var slot=$('ansSlot');
    if(!slot)return;
    if(EX.hint<=0)slot.innerHTML='<div class="slot-hint-msg">아래 힌트를 누르면 글자 수가 표시됩니다</div>';
    else slot.innerHTML=spellBoxes(w);
  }else{
    var qs=$('qSent');
    if(!qs)return;
    var re=new RegExp('\\b'+reEsc(w)+'\\b','i');
    var fill=EX.hint<=0?'<span class="blankhl"></span>':
      '<span class="spell-inline">'+spellBoxes(w)+'</span>';
    qs.innerHTML=esc(it[3]).replace(re,fill);
  }
}
function useHint(){
  var w=EX.items[EX.idx][0];
  if(EX.hint<2 && EX.hint<w.length)EX.hint++;
  renderAnswerSlot();
  updateHintBtn();
}
function updateHintBtn(){
  var w=EX.items[EX.idx][0];
  var left=2-EX.hint;
  $('hintBtn').disabled=EX.hint>=2||EX.hint>=w.length;
  $('hintBtn').textContent='힌트 ('+(left>0?left+'회':'없음')+')';
}
function speak(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('이 브라우저는 음성 인식을 지원하지 않습니다.');return;}
  if(EX.rec){try{EX.rec.abort();}catch(e){}}
  var it=EX.items[EX.idx];
  var rec=new SR();
  EX.rec=rec;
  rec.lang=EX.stage===2?'ko-KR':'en-US';
  rec.continuous=false;rec.interimResults=true;rec.maxAlternatives=5;
  $('micBtn').disabled=true;
  $('micBtn').className='micbtn rec';
  if(EX.stage===3)$('qLive').textContent='';
  var finalRes=null;
  rec.onresult=function(e){
    var interim='';
    for(var i=0;i<e.results.length;i++){
      var r=e.results[i];
      if(r.isFinal)finalRes=r;else interim+=r[0].transcript;
    }
    if(EX.stage===3)$('qLive').textContent=interim||(finalRes?finalRes[0].transcript:'');
  };
  rec.onerror=function(){};
  rec.onend=function(){
    $('micBtn').className='micbtn';
    grade(it,finalRes);
  };
  try{rec.start();}catch(e){
    $('micBtn').disabled=false;$('micBtn').className='micbtn';
  }
}
function grade(it,finalRes){
  var target=it[0],best=0;
  if(finalRes){
    for(var i=0;i<finalRes.length;i++){
      var t=finalRes[i].transcript||'';
      var s=EX.stage===2?simNoSpace(t,it[2]):bestPhraseSim(t,target);
      if(s>best)best=s;
    }
  }
  if(best>=0.7){
    var msg=EX.stage===1?'정답!':
      EX.stage===2?'정답! 영어 발음을 조금 더 또박또박 연습해볼까요?':
      '정답! 문장으로 잘 읽었어요';
    $('qStatus').innerHTML=esc(msg)+'<br><b>'+esc(target)+'</b>';
    $('qStatus').className='status ok';
    EX.results.push({word:target,correct:true,stage:EX.stage,hint:EX.hint});
    finishQuestion();
  }else if(EX.stage<3){
    EX.stage++;
    renderStageView();
    $('qStatus').textContent='다르게 들렸어요 — '+$('qStatus').textContent;
    $('qStatus').className='status retry';
    $('micBtn').disabled=false;
  }else{
    $('qStatus').innerHTML='아쉬워요. 정답: <b>'+esc(target)+'</b>';
    $('qStatus').className='status no';
    EX.results.push({word:target,correct:false,stage:0,hint:EX.hint});
    finishQuestion();
  }
}
// 채점 종료 — 정답 노출 + 버튼 상태(다음만 활성)
function finishQuestion(){
  $('micBtn').disabled=true;
  $('hintBtn').disabled=true;
  $('skipBtn').disabled=true;
  $('nextBtn').disabled=false;
  $('nextBtn').textContent=(EX.idx>=EX.items.length-1)?'결과 보기':'다음';
}
function goNext(){
  if($('nextBtn').disabled)return;
  nextQ();
}
function skipQ(){
  if($('skipBtn').disabled)return;
  if(EX.rec){try{EX.rec.abort();}catch(e){}}
  EX.results.push({word:EX.items[EX.idx][0],correct:false,stage:0,hint:EX.hint,skipped:true});
  nextQ();
}
function nextQ(){
  EX.idx++;
  if(EX.idx>=EX.items.length)showResult();
  else renderQ();
}
function showResult(){
  show('resultScreen');
  var correct=EX.results.filter(function(r){return r.correct;}).length;
  var total=EX.results.length||1;
  $('scoreNum').textContent=Math.round(correct/total*100)+'점';
  $('scoreSub').textContent=correct+' / '+EX.results.length+' 정답';
  var html='';
  EX.results.forEach(function(r,i){
    var label,cls;
    if(r.skipped){label='건너뜀';cls='t-no';}
    else if(!r.correct){label='오답';cls='t-no';}
    else if(r.stage===1){label='1차 통과';cls='t-ok';}
    else if(r.stage===2){label='2차 통과';cls='t-near';}
    else {label='3차 통과';cls='t-near';}
    var hint=r.hint>0?' · 힌트 '+r.hint:'';
    html+='<div class="ritem"><span>'+(i+1)+'. '+esc(r.word)+'</span>'+
      '<span class="rtag '+cls+'">'+label+hint+'</span></div>';
  });
  $('itemList').innerHTML=html;
}
</script>
</body>
</html>
