<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>큰소리 영어 — 슈퍼 관리자</title>
<link rel="stylesheet" href="/admin/style.css">
<style>
  /* main 영역만 스크롤. header/tabs/검색창은 고정 */
  html, body { overflow: hidden !important; height: 100% !important; }
  body { display: flex; flex-direction: column; }
  .super-header { background:linear-gradient(135deg,#E8714A,#D85A30); color:white; padding:14px 22px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
  .super-header .title { font-size:18px; font-weight:700; display:flex; align-items:center; gap:10px; }
  .super-header .title img { width:32px; height:32px; }
  .super-header .right { display:flex; gap:10px; align-items:center; }
  .super-header .right a { color:white; text-decoration:none; padding:6px 12px; border:1px solid rgba(255,255,255,.4); border-radius:6px; font-size:13px; }
  .super-header .right a:hover { background:rgba(255,255,255,.15); }
  .super-main { flex:1; overflow-y:auto; padding:22px; max-width:1280px; width:100%; margin:0 auto; box-sizing:border-box; }
  /* 탭은 main 의 스크롤 영역 안에서 sticky — 스크롤해도 위에 붙어 보임 */
  .super-tabs { display:flex; gap:6px; border-bottom:1px solid #ddd; margin-bottom:18px; position:sticky; top:0; background:var(--bg, #f7f7f7); z-index:30; padding-top:2px; }
  .super-tabs button { background:none; border:none; padding:10px 16px; cursor:pointer; font-size:14px; color:#666; border-bottom:2px solid transparent; }
  .super-tabs button.active { color:var(--teal); border-bottom-color:var(--teal); font-weight:700; }
  /* 사용자 검색의 검색바 — 탭 아래 sticky */
  #page-users > .card:first-child { position:sticky; top:46px; z-index:20; }
</style>
</head>
<body>

<header class="super-header">
  <div class="title">
    <img src="/icons/icon-192.png" alt="">
    슈퍼 관리자
  </div>
  <div class="right">
    <span id="superName" style="font-size:13px;">…</span>
    <a href="#" onclick="openProfileModal();return false;">⚙ 내 정보</a>
    <a href="#" onclick="doLogout();return false;" style="background:rgba(0,0,0,.15);">로그아웃</a>
  </div>
</header>

<main class="super-main">
  <div class="super-tabs">
    <button class="active" id="tab-academies" onclick="goTab('academies')">🏢 학원 관리</button>
    <button id="tab-users" onclick="goTab('users')">👥 사용자 검색</button>
    <button id="tab-tools" onclick="goTab('tools')">🛠 도구</button>
  </div>

  <!-- 학원 관리 -->
  <div class="page active" id="page-academies">
    <div style="display:flex;justify-content:flex-end;margin-bottom:12px;">
      <button class="btn btn-primary" onclick="openAcademyCreateModal()">+ 신규 학원</button>
    </div>
    <div class="card" style="padding:0;">
      <table class="table">
        <thead>
          <tr>
            <th>학원명</th>
            <th>Subdomain</th>
            <th>플랜</th>
            <th>학생 한도</th>
            <th>사용량 (이번 달)</th>
            <th>생성일</th>
            <th>상태</th>
          </tr>
        </thead>
        <tbody id="academiesTableBody">
          <tr><td colspan="7" style="text-align:center;color:#bbb;padding:20px;">로딩 중...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- 사용자 검색 -->
  <div class="page" id="page-users">
    <div class="card" style="padding:14px 18px;margin-bottom:12px;display:flex;gap:10px;align-items:center;">
      <input id="userSearchInput" type="text" placeholder="이름 / 이메일 / username / uid" style="flex:1;border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;outline:none;" onkeyup="if(event.key==='Enter')runUserSearch()">
      <select id="userRoleFilter" style="border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;">
        <option value="">전체 role</option>
        <option value="student">학생</option>
        <option value="admin">학원장</option>
        <option value="super_admin">super_admin</option>
      </select>
      <button class="btn btn-primary" onclick="runUserSearch()">🔍 검색</button>
    </div>
    <div class="card" style="padding:0;">
      <table class="table">
        <thead>
          <tr>
            <th class="sortable" onclick="sortUsers('name')">이름 <span id="sortMark-name"></span></th>
            <th class="sortable" onclick="sortUsers('username')">username <span id="sortMark-username"></span></th>
            <th class="sortable" onclick="sortUsers('email')">이메일 <span id="sortMark-email"></span></th>
            <th class="sortable" onclick="sortUsers('academyName')">학원명 <span id="sortMark-academyName"></span></th>
            <th class="sortable" onclick="sortUsers('role')">역할 <span id="sortMark-role"></span></th>
            <th class="sortable" onclick="sortUsers('status')">상태 <span id="sortMark-status"></span></th>
            <th class="sortable" onclick="sortUsers('createdAt')">가입일 <span id="sortMark-createdAt"></span></th>
          </tr>
        </thead>
        <tbody id="userSearchBody">
          <tr><td colspan="7" style="text-align:center;color:#bbb;padding:20px;">검색어 입력 후 Enter 또는 🔍 클릭</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- 도구 -->
  <div class="page" id="page-tools">
    <div class="card" style="padding:18px;">
      <div style="font-weight:700;margin-bottom:10px;">외부 대시보드</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <a class="btn btn-primary" href="https://aistudio.google.com/rate-limit?timeRange=last-90-days&project=readaloud-51113" target="_blank" rel="noopener">🤖 Gemini 사용량 (Google)</a>
        <a class="btn btn-secondary" href="https://console.firebase.google.com/project/readaloud-51113/overview" target="_blank" rel="noopener">🔥 Firebase Console</a>
        <a class="btn btn-secondary" href="https://vercel.com/harry-kims-projects-2eb6982d/readaloud-app" target="_blank" rel="noopener">▲ Vercel</a>
      </div>
      <div style="margin-top:18px;font-size:12px;color:var(--gray);">
        ※ Gemini 공식 대시보드는 슈퍼 관리자만 접근 가능. 학원장(academy_admin) 은 자기 학원 위젯만 볼 수 있음.
      </div>
    </div>
  </div>
</main>

<!-- 모달 -->
<div id="modalOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;">
  <div id="modalBox" style="background:white;border-radius:12px;max-width:95vw;max-height:90vh;overflow:auto;"></div>
</div>
<div id="toast" style="position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:#222;color:white;padding:10px 20px;border-radius:6px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .2s;z-index:300;"></div>

<script type="module" src="/super/js/app.js"></script>
</body>
</html>
